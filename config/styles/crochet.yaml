# Style slot parametrizable. Mismo patron que lego.yaml: cambiar este archivo
# (o --style) altera el look sin tocar la orquestacion. El look "amigurumi /
# crochet" se guia con prompt + style ref; no requiere LoRA entrenado.
style: crochet
keyframe:
  backend: fal
  model: "fal-ai/flux-lora"
  lora: "<url-o-id-del-lora-crochet>"  # TODO opcional. Sin LoRA el prompt + style ref guian el look
  strength: 0.9
  ref_model: "fal-ai/nano-banana/edit"
prompt_template: >
  {scene_prompt}, crochet craft style — yarn and wool textures, visible hand-knitted
  stitches, cotton and acrylic fiber materials, educational craft diorama props,
  warm mustard and cream color palette, macro photography, shallow depth of field,
  soft natural side lighting, highly detailed fiber arts
negative_prompt: "LEGO, plastic, minifigure, smooth rubber surface, blurry, deformed,
  cat, dynamite, explosion, confetti, flag, 3D render, CGI, anime, cartoon flat style"
