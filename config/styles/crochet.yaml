# Style slot parametrizable. Mismo patron que lego.yaml: cambiar este archivo
# (o --style) altera el look sin tocar la orquestacion. El look "amigurumi /
# crochet" se guia con prompt + style ref; no requiere LoRA entrenado.
style: crochet
keyframe:
  backend: fal
  model: "fal-ai/flux-lora"
  lora: "<url-o-id-del-lora-crochet>"  # TODO opcional. Sin LoRA el prompt + style ref guian el look
  strength: 0.9
  ref_model: "fal-ai/nano-banana/edit"
prompt_template: >
  {scene_prompt}, amigurumi crochet style, yarn and wool texture, visible crochet
  stitches, handcrafted stuffed toy characters, soft natural lighting, macro
  photography, shallow depth of field, cozy aesthetic, highly detailed
negative_prompt: "LEGO, plastic, minifigure, realistic skin, photorealism, smooth surface, blurry, deformed, cat, dynamite, explosion, confetti, flag"
