# Backends de generacion de video. Costo/seg y capabilities por modelo.
# Revalidar precios contra el pricing vigente antes de cerrar presupuesto.
providers:
  kling:
    backend: fal
    model: "fal-ai/kling-video/v2.1/standard/image-to-video"
    cost_per_second: 0.03
    capabilities: [i2v, lipsync, "4k"]
  # D-070: el ÚNICO Kling 2.1 con end-frame real (tail_image_url). El standard
  # NO lo tiene: fal ignoraba nuestro end_image_url en silencio y la
  # interpolación de D-059/D-060 jamás se ejecutó. Solo para planos `lands`.
  kling_pro:
    backend: fal
    model: "fal-ai/kling-video/v2.1/pro/image-to-video"
    cost_per_second: 0.09   # $0.45 / video de 5s (3x el standard) — verificado 2026-06
    capabilities: [i2v, lipsync, "4k", end_frame]
  seedance:
    backend: fal
    model: "fal-ai/bytedance/seedance/v1/lite/image-to-video"
    cost_per_second: 0.06
    capabilities: [i2v, multishot]
  veo:
    backend: google
    model: "veo-2.0-generate-001"
    cost_per_second: 0.35
    capabilities: [i2v]

# Post de audio (D-034): NO entra al routing (no compite con los de arriba). Es el
# paso video-to-audio que agrega SFX + ambiente sincronizados al clip ya generado.
# Model ID de la doc de fal; revalidar contra la API real en el smoke (D-020).
audio:
  mmaudio:
    backend: fal
    model: "fal-ai/mmaudio-v2"
    cost_per_second: 0.001
    capabilities: [v2a]
