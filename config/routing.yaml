# Tabla de orquestacion: clasificacion de escena -> estrategia + providers.
# Cambiar aqui altera el ruteo sin tocar codigo (D-038).
#
# DOS secciones independientes (D-053):
#
#   storyboard_backends  — fase creativa (cast, keyframes, prompts, describe)
#     Controla: backend de imagen (fal/google) + LLM narrativo + costo/imagen.
#     Se activa con --backend <nombre> en el CLI o desde el chip del Storyboard.
#     Persiste en project.yaml como `storyboard_backend: fal`.
#
#   profiles             — fase de produccion (render, run)
#     Controla: estrategia de video (router/cascade/ensemble), providers, gate VLM.
#     Se activa con --profile <nombre> en el CLI.
#     Default: fal-ultra-cheap (lo mas barato).

storyboard_backends:
  fal:
    _meta:
      label: "fal.ai"
      desc: "Flux + nano-banana para imagen; Claude Haiku para narrativa."
      badge: "fal.ai"
      color: "yellow"
    keyframe:
      backend: fal
      model: null         # usa el del estilo (lego.yaml -> fal-ai/flux-lora)
    llm:
      backend: anthropic
      model: "claude-haiku-4-5-20251001"
    est_cost_per_image_usd: 0.003

  google:
    _meta:
      label: "Google"
      desc: "Gemini imagen para keyframes; Gemini Flash para narrativa. Cero fal."
      badge: "google"
      color: "teal"
    keyframe:
      backend: google
      model: null         # usa GOOGLE_IMAGE_MODEL (gemini-2.5-flash-image)
    llm:
      backend: google
      model: "gemini-2.0-flash"
    est_cost_per_image_usd: 0.002

profiles:
  fal-ultra-cheap:
    _meta:
      label: "Ultra Cheap"
      desc: "Kling + sin gate. Minimo costo para iterar. Default."
      badge: "fal.ai"
      color: "orange"
    hero:
      strategy: router
      providers: [kling]
    standard:
      strategy: router
      providers: [kling]
    volume:
      strategy: router
      providers: [kling]
    gate:
      enabled: false
      vlm_model: null
    est_cost_per_scene_usd: 0.01

  proto:
    _meta:
      label: "Prototipo fal"
      desc: "Kling directo, sin ensemble. Barato y rapido para validar el storyboard."
      badge: "fal.ai"
      color: "yellow"
    hero:
      strategy: router
      providers: [kling]
    standard:
      strategy: router
      providers: [kling]
    volume:
      strategy: router
      providers: [kling]
    gate:
      enabled: false
      vlm_model: null
    est_cost_per_scene_usd: 0.01

  fal-standard:
    _meta:
      label: "fal Standard"
      desc: "Calidad media. Router/cascade con Seedance+Kling; gate con Haiku."
      badge: "fal.ai"
      color: "cyan"
    hero:
      strategy: ensemble
      providers: [seedance, kling]
    standard:
      strategy: router
      providers: [kling, seedance]
    volume:
      strategy: cascade
      providers: [kling, seedance]
    gate:
      enabled: true
      vlm_model: "claude-haiku-4-5-20251001"
    est_cost_per_scene_usd: 0.05

  prod:
    _meta:
      label: "Produccion"
      desc: "Ensemble en hero, gate de calidad, modelos premium. Para entrega final."
      badge: "calidad"
      color: "green"
    hero:
      strategy: ensemble
      providers: [veo, seedance, kling]
    standard:
      strategy: router
      providers: [seedance, kling]
    volume:
      strategy: cascade
      providers: [kling, seedance, veo]
    gate:
      enabled: true
      vlm_model: "claude-opus-4-8"
    est_cost_per_scene_usd: 0.15

  proto_veo:
    _meta:
      label: "Prototipo Google"
      desc: "Veo directo desde Google AI. Para cuando no hay credito en fal."
      badge: "google"
      color: "blue"
    hero:
      strategy: router
      providers: [veo]
    standard:
      strategy: router
      providers: [veo]
    volume:
      strategy: router
      providers: [veo]
    gate:
      enabled: false
      vlm_model: null
    est_cost_per_scene_usd: 0.04

  gemini-budget:
    _meta:
      label: "Gemini Budget"
      desc: "100% Google video: Veo + gate Gemini Flash. Combina con --backend google para cero fal."
      badge: "google"
      color: "teal"
    hero:
      strategy: router
      providers: [veo]
    standard:
      strategy: router
      providers: [veo]
    volume:
      strategy: router
      providers: [veo]
    gate:
      enabled: true
      vlm_model: "gemini-2.0-flash"
    est_cost_per_scene_usd: 0.02

# Gate suave por defecto: puntua y registra pero NO bloquea ni regenera.
enforce: false

# Umbrales del Quality Gate por tipo de escena (hero mas estricto).
thresholds:
  hero:
    aesthetic: 0.80
    char_consistency: 0.85
    clip_adherence: 0.75
  standard:
    aesthetic: 0.65
    char_consistency: 0.70
    clip_adherence: 0.65
  volume:
    aesthetic: 0.50
    char_consistency: 0.55
    clip_adherence: 0.55
