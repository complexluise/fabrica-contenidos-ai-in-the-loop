# Tabla de orquestacion: clasificacion de escena -> estrategia + providers.
# Cambiar aqui altera el ruteo sin tocar codigo (D-038).
#
# Perfiles disponibles (--profile en el CLI):
#   prod  — calidad maxima: ensemble para hero, router/cascade para el resto.
#   proto — iteracion barata: router + proveedor unico para todo. Un candidato,
#           minimo costo, sin gate enforcement. Ideal para validar el storyboard.
profiles:
  prod:
    _meta:
      label: "Produccion"
      desc: "Ensemble en hero, gate de calidad, modelos premium. Para entrega final."
      badge: "calidad"
      color: "green"
    hero:
      strategy: ensemble
      providers: [veo, seedance, kling]
    standard:
      strategy: router
      providers: [seedance, kling]
    volume:
      strategy: cascade
      providers: [kling, seedance, veo]

  proto:
    _meta:
      label: "Prototipo fal"
      desc: "Kling directo, sin ensemble. Barato y rapido para validar el storyboard."
      badge: "fal.ai"
      color: "yellow"
    hero:
      strategy: router
      providers: [kling]
    standard:
      strategy: router
      providers: [kling]
    volume:
      strategy: router
      providers: [kling]

  proto_veo:
    _meta:
      label: "Prototipo Google"
      desc: "Veo directo desde Google AI. Para cuando no hay credito en fal."
      badge: "google"
      color: "blue"
    hero:
      strategy: router
      providers: [veo]
    standard:
      strategy: router
      providers: [veo]
    volume:
      strategy: router
      providers: [veo]

# Gate suave por defecto: puntua y registra (Claude vision) pero NO bloquea ni
# regenera mientras iteras. Poner true para endurecer (dispara reintento/escalado).
enforce: false

# Umbrales del Quality Gate por tipo de escena (hero mas estricto).
thresholds:
  hero:
    aesthetic: 0.80
    char_consistency: 0.85
    clip_adherence: 0.75
  standard:
    aesthetic: 0.65
    char_consistency: 0.70
    clip_adherence: 0.65
  volume:
    aesthetic: 0.50
    char_consistency: 0.55
    clip_adherence: 0.55
