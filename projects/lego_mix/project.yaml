project: lego_mix
title: Un dia en la ciudad LEGO
brief: Una ciudad construida con LEGO despierta al amanecer, se llena de minifiguras
  yendo al trabajo y late a pleno ritmo cuando el sol esta alto.
style: lego
format: '9:16'
scenes:
- id: s1
  prompt: a LEGO city at dawn, empty streets with golden light between the block buildings
  duration_s: 6
  beat: apertura
  class: volume
  ambience: calm dawn city ambience, distant birds, soft breeze
  visual_intensity: 2
  shots:
  - intention: establecer el mundo, la calma antes del movimiento
    action: wide establishing shot of the LEGO city at dawn, long shadows over empty
      avenues
    duration_s: 3
    camera:
      size: LS
      angle: high
      move: pan
    visual:
      tone: high_key
      focal_point: the empty main avenue
      palette:
      - amber
      - cream
    transition: cut
    voiceover: Al amanecer, la ciudad aun duerme.
  - intention: un detalle intimo que marca el paso de la noche al dia
    action: insert of a LEGO streetlamp switching off as the morning light grows
    duration_s: 3
    camera:
      size: insert
      focus: shallow
    visual:
      tone: high_key
      focal_point: the streetlamp bulb
    transition: match_cut
    caption: Amanece
- id: s2
  prompt: the LEGO city streets fill with minifigures walking to work
  duration_s: 6
  beat: despertar
  class: standard
  ambience: rising urban murmur, footsteps of a crowd on the street
  visual_intensity: 3
  shots:
  - intention: mostrar la ciudad cobrando vida
    action: medium shot of LEGO minifigures stepping out of their houses into the
      street
    duration_s: 3
    camera:
      move: push_in
    visual:
      palette:
      - primary-red
      - yellow
      - blue
    transition: cut
    voiceover: Poco a poco, las minifiguras llenan las calles.
  - intention: dar energia y flujo al movimiento colectivo
    action: lateral tracking shot following the flow of minifigures down the avenue
    duration_s: 3
    camera:
      size: MLS
      move: track
    visual:
      rhythm: brisk, repetitive crowd movement
- id: s3
  prompt: the sun is high over the busy LEGO city, vehicles and minifigures everywhere
  duration_s: 5
  beat: clima
  class: hero
  ambience: heavy city traffic, distant horns, midday bustle
  visual_intensity: 5
  shots:
  - intention: el clima del dia, la ciudad a pleno ritmo
    action: dynamic wide shot of midday traffic under the high sun, crowded streets
      and vehicles
    duration_s: 5
    camera:
      size: LS
      angle: low
      move: crane
    visual:
      tone: high_key
      rhythm: fast and busy
      palette:
      - bright primary colors
    transition: cut
    voiceover: Con el sol en lo alto, la ciudad late a pleno ritmo.
